name: Notify parent add-on repo

on:
  push:
    tags:
      - "*"

jobs:
  notify-parent:
    runs-on: ubuntu-latest

    steps:
      - name: Validate version tag
        id: tagcheck
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${TAG_NAME}" =~ ^v?[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "Skipping non-version tag: ${TAG_NAME}"
          fi

      - name: Create GitHub App token for parent repo
        if: steps.tagcheck.outputs.valid == 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.PARENT_SYNC_APP_ID }}
          private-key: ${{ secrets.PARENT_SYNC_APP_PRIVATE_KEY }}
          owner: Sanher
          repositories: sanher-ha-addons
          permission-contents: write

      - name: Send repository dispatch to parent
        if: steps.tagcheck.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ github.ref_name }}
          REPO_NAME: ${{ github.repository }}
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          curl -sSf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            https://api.github.com/repos/Sanher/sanher-ha-addons/dispatches \
            -d @- <<JSON
          {
            "event_type": "child-tag-published",
            "client_payload": {
              "repo": "${REPO_NAME}",
              "tag": "${TAG_NAME}",
              "sha": "${COMMIT_SHA}",
              "commit_message": "${COMMIT_MESSAGE}"
            }
          }
          JSON
